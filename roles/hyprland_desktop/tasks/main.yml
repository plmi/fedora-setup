---
- name: Ensure dnf COPR plugin is installed
  ansible.builtin.dnf:
    name: dnf-plugins-core
    state: present
  when: hyprland_enable_copr | bool

- name: Enable Hyprland COPR repository
  ansible.builtin.command:
    cmd: "dnf -y copr enable {{ hyprland_copr_repo }}"
    creates: "{{ hyprland_copr_repo_file }}"
  when: hyprland_enable_copr | bool

- name: Install Hyprland stack
  ansible.builtin.dnf:
    name: "{{ hyprland_packages }}"
    state: present

- name: Ensure spice-vdagentd is enabled and running
  ansible.builtin.systemd:
    name: spice-vdagentd
    enabled: true
    state: started

- name: Ensure user config directories exist
  ansible.builtin.file:
    path: "/home/{{ primary_user }}/{{ item }}"
    state: directory
    owner: "{{ primary_user }}"
    group: "{{ primary_user }}"
    mode: "0755"
  loop:
    - .config/hypr
    - .config/waybar
    - .config/waybar/scripts
    - .config/swaync
    - .config/wofi
    - .config/swappy
    - .config/autostart
    - .local/bin

- name: Ensure OSCP workspace directories exist
  ansible.builtin.file:
    path: "/home/{{ primary_user }}/{{ item }}"
    state: directory
    owner: "{{ primary_user }}"
    group: "{{ primary_user }}"
    mode: "0755"
  loop:
    - oscp
    - oscp/targets

- name: Deploy hyprland config
  ansible.builtin.template:
    src: hyprland.conf.j2
    dest: "/home/{{ primary_user }}/.config/hypr/hyprland.conf"
    owner: "{{ primary_user }}"
    group: "{{ primary_user }}"
    mode: "0644"

- name: Deploy OSCP wofi launcher
  ansible.builtin.copy:
    src: wofi-oscp.sh
    dest: "/home/{{ primary_user }}/.local/bin/wofi-oscp"
    owner: "{{ primary_user }}"
    group: "{{ primary_user }}"
    mode: "0755"

- name: Deploy waybar config
  ansible.builtin.template:
    src: waybar.jsonc.j2
    dest: "/home/{{ primary_user }}/.config/waybar/config.jsonc"
    owner: "{{ primary_user }}"
    group: "{{ primary_user }}"
    mode: "0644"

- name: Deploy waybar style
  ansible.builtin.copy:
    src: waybar.css
    dest: "/home/{{ primary_user }}/.config/waybar/style.css"
    owner: "{{ primary_user }}"
    group: "{{ primary_user }}"
    mode: "0644"

- name: Deploy waybar VPN status script
  ansible.builtin.copy:
    src: waybar-vpn-status.sh
    dest: "/home/{{ primary_user }}/.config/waybar/scripts/vpn-status.sh"
    owner: "{{ primary_user }}"
    group: "{{ primary_user }}"
    mode: "0755"

- name: Deploy waybar target status script
  ansible.builtin.copy:
    src: waybar-target-status.sh
    dest: "/home/{{ primary_user }}/.config/waybar/scripts/target-status.sh"
    owner: "{{ primary_user }}"
    group: "{{ primary_user }}"
    mode: "0755"

- name: Deploy waybar public IP script
  ansible.builtin.copy:
    src: waybar-public-ip.sh
    dest: "/home/{{ primary_user }}/.config/waybar/scripts/public-ip.sh"
    owner: "{{ primary_user }}"
    group: "{{ primary_user }}"
    mode: "0755"

- name: Deploy swaync config
  ansible.builtin.copy:
    src: swaync-config.json
    dest: "/home/{{ primary_user }}/.config/swaync/config.json"
    owner: "{{ primary_user }}"
    group: "{{ primary_user }}"
    mode: "0644"

- name: Deploy swaync style
  ansible.builtin.copy:
    src: swaync-style.css
    dest: "/home/{{ primary_user }}/.config/swaync/style.css"
    owner: "{{ primary_user }}"
    group: "{{ primary_user }}"
    mode: "0644"

- name: Deploy wofi config
  ansible.builtin.template:
    src: wofi/config.j2
    dest: "/home/{{ primary_user }}/.config/wofi/config"
    owner: "{{ primary_user }}"
    group: "{{ primary_user }}"
    mode: "0644"

- name: Deploy wofi style
  ansible.builtin.copy:
    src: wofi/style.css
    dest: "/home/{{ primary_user }}/.config/wofi/style.css"
    owner: "{{ primary_user }}"
    group: "{{ primary_user }}"
    mode: "0644"

- name: Deploy swappy config
  ansible.builtin.template:
    src: swappy/config.j2
    dest: "/home/{{ primary_user }}/.config/swappy/config"
    owner: "{{ primary_user }}"
    group: "{{ primary_user }}"
    mode: "0644"

- name: Deploy spice-vdagent launcher for Hyprland sessions
  ansible.builtin.template:
    src: spice-vdagent-hyprland.sh.j2
    dest: "/home/{{ primary_user }}/.local/bin/spice-vdagent-hyprland.sh"
    owner: "{{ primary_user }}"
    group: "{{ primary_user }}"
    mode: "0755"

- name: Override desktop autostart for spice-vdagent to avoid duplicate agents
  ansible.builtin.copy:
    src: spice-vdagent.desktop
    dest: "/home/{{ primary_user }}/.config/autostart/spice-vdagent.desktop"
    owner: "{{ primary_user }}"
    group: "{{ primary_user }}"
    mode: "0644"
