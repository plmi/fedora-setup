---
- name: Ensure primary user exists
  ansible.builtin.user:
    name: "{{ primary_user }}"
    shell: "{{ primary_user_shell }}"
    groups: "{{ primary_user_groups }}"
    append: true
    create_home: true

- name: Ensure workspace directories exist
  ansible.builtin.file:
    path: "/home/{{ primary_user }}/{{ item }}"
    state: directory
    owner: "{{ primary_user }}"
    group: "{{ primary_user }}"
    mode: "0755"
  loop:
    - loot
    - notes
    - wordlists
    - screenshots
